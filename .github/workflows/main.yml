name: Turbo Cloud Firefox (Fixed Link)

on:
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Turbo Boot Environment
        run: |
          # 1. Jalankan Docker jlesage/firefox di background (Proses download dimulai langsung)
          docker run -d \
            --name firefox \
            -p 5800:5800 \
            --shm-size=2g \
            jlesage/firefox:latest

          # 2. Download Ngrok menggunakan cara yang lebih aman (Direct Binary)
          echo "Downloading Ngrok..."
          wget -q https://bin.equinox.io/c/b34edq6jn9t/ngrok-v3-stable-linux-amd64.tgz -O ngrok.tgz
          
          # Cek apakah file benar-benar terdownload, jika gagal gunakan link alternatif
          if [ ! -s ngrok.tgz ]; then
            wget -q https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-linux-amd64.tgz -O ngrok.tgz
          fi

          tar -xzf ngrok.tgz
          sudo mv ngrok /usr/local/bin/
          rm ngrok.tgz

          # 3. Konfigurasi Ngrok
          # Gunakan token Anda sendiri jika ada, ini adalah token publik cadangan
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN || '2eGyEJzcdePNVkGXaSao5HUo7QO_Ci6EDAi5wmRYV99kZQNB' }}"
          
          # 4. Jalankan Ngrok Tunnel ke Port 5800
          ngrok http 5800 --log=stdout > ngrok.log &

          # 5. Polling cepat untuk mengambil URL
          echo "Menunggu link siap..."
          sleep 10
          
          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          if [ "$PUBLIC_URL" = "null" ] || [ -z "$PUBLIC_URL" ]; then
            echo "❌ Gagal mendapatkan URL. Menunggu lebih lama..."
            sleep 10
            PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          fi

          echo "================================================================"
          echo "✅ BERHASIL!"
          echo "BUKA LINK INI:"
          echo "----------------------------------------------------------------"
          echo "$PUBLIC_URL"
          echo "----------------------------------------------------------------"
          echo "Jika muncul layar hitam, tunggu 10 detik sampai Firefox selesai pull."
          echo "================================================================"

      - name: Keep Session Alive
        run: |
          echo "Workflow aktif selama 5 jam. Klik 'Cancel workflow' jika sudah selesai."
          sleep 18000
