name: Cloud Browser via Ngrok (Super Fast & Stable APT)

on:
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Setup Cache untuk Docker Image Selenium Firefox
      - name: Cache Docker layers
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/docker-save
          key: ${{ runner.os }}-docker-firefox-v1

      # 2. Muat Image dari cache jika ada, jika tidak ada maka Pull dari Docker Hub
      - name: Load Docker Image
        run: |
          if [ "${{ steps.cache-docker.outputs.cache-hit }}" = "true" ]; then
            echo "Memuat container dari Cache..."
            docker load -i /tmp/docker-save/firefox-image.tar
          else
            echo "Cache tidak ditemukan. Mengunduh image dari Docker Hub..."
            docker pull selenium/standalone-firefox:latest
            mkdir -p /tmp/docker-save
            docker save selenium/standalone-firefox:latest -o /tmp/docker-save/firefox-image.tar
          fi

      # 3. Jalankan Container Firefox secara mandiri (Detach Mode)
      - name: Run Firefox Container
        run: |
          docker run -d --name firefox-node \
            --user root \
            -p 7900:7900 \
            -p 5900:5900 \
            --shm-size=2g \
            selenium/standalone-firefox:latest

      # 4. Install Ngrok via Repositori Resmi APT (Solusi Error Tar)
      - name: Install Ngrok via APT Repository
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
            && echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list \
            && sudo apt update \
            && sudo apt install -y ngrok

      # 5. Konfigurasi Token dan Jalankan Terowongan (Tunnel)
      - name: Start Ngrok Tunnel
        run: |
          # Menggunakan token sementara Anda
          ngrok config add-authtoken 2eGyEJzcdePNVkGXaSao5HUo7QO_Ci6EDAi5wmRYV99kZQNB
          
          # Jalankan skema TCP ke port noVNC (7900)
          ngrok tcp 7900 --log=stdout > ngrok.log &

      # 6. Ambil Link noVNC dari Ngrok menggunakan parsing JSON v3 yang benar
      - name: Get noVNC URL
        run: |
          sleep 10
          echo "================================================================"
          echo "Mencoba mengambil URL Ngrok..."
          
          # Ekstraksi alamat publik dari API Ngrok
          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          # Validasi jika token terblokir / error
          if [ "$PUBLIC_URL" = "null" ] || [ -z "$PUBLIC_URL" ]; then
            echo "❌ ERROR: Ngrok gagal membuat terowongan! Berikut log error-nya:"
            echo "================================================================"
            cat ngrok.log
            echo "================================================================"
            exit 1
          fi
          
          # Mengubah skema dari tcp:// menjadi https:// agar bisa langsung diklik
          WEB_URL=$(echo $PUBLIC_URL | sed 's/tcp:\/\//https:\/\//')
          
          echo "✅ BERHASIL! KLIK TAUTAN DI BAWAH INI UNTUK MEMBUKA BROWSER:"
          echo "$WEB_URL/vnc.html?autoconnect=1&resize=scale&password=secret"
          echo "================================================================"

      # 7. Menjaga workflow tetap hidup selama 6 Jam
      - name: Keep Alive
        run: |
          echo "Cloud Browser aktif. Silakan akses lewat link di atas."
          sleep 21600

      # 8. Pembersihan yang akan SELALU berjalan di akhir sesi
      - name: Cleanup Connections and Containers
        if: always()
        run: |
          echo "Membersihkan container dan menutup koneksi Ngrok..."
          pkill ngrok || true
          docker stop firefox-node || true
          docker rm firefox-node || true
