name: FreeRDP Android APK Builder

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - 'releases/**'

jobs:
  build-android:
    runs-on: ubuntu-24.04
    name: Build FreeRDP Android APK
    
    steps:
      - name: Checkout FreeRDP Sources (Recursive)
        uses: actions/checkout@v4
        with:
          repository: freerdp/freerdp
          ref: 3.9.0
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java Development Kit (JDK)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK & Setup NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK 26.1.10909125
        run: |
          echo "y" | sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Install System Compilation Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build ccache git libssl-dev pkg-config
          echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> $GITHUB_ENV
          echo "USE_CCACHE=1" >> $GITHUB_ENV

      - name: Cache Build Dependencies & Gradle Packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.ccache
            $GITHUB_WORKSPACE/.ccache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
    
      - name: Setup OpenSSL & Executable Permissions
        run: |
          if [ -f "client/Android/prepare-openssl.sh" ]; then
            chmod +x client/Android/prepare-openssl.sh
          fi
          # Perbaikan path ke folder Studio
          chmod +x client/Android/Studio/gradlew

      - name: Configure CMake and Android ABI Limits
        run: |
          # Inject target ABIs limits into gradle properties to speed up compiles
          echo "android.injected.build.abi=arm64-v8a" >> client/Android/Studio/gradle.properties
          echo "FREERDP_ANDROID_ABI=arm64-v8a" >> client/Android/Studio/gradle.properties

      - name: Generate Manual Keystore
        run: |
          # Membuat keystore manual on-the-fly untuk proses build
          # Kita simpan di dalam folder app sesuai ekspektasi gradle
          keytool -genkey -v \
            -keystore client/Android/Studio/app/release.keystore \
            -alias freerdp_alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=FreeRDP Builder, OU=Android, O=FreeRDP, L=Unknown, S=Unknown, C=US" \
            -storepass freerdp_pass \
            -keypass freerdp_pass

      - name: Setup Gradle Build Signing Properties
        run: |
          # Menambahkan konfigurasi keystore yang baru dibuat ke gradle.properties
          cat <<EOF >> client/Android/Studio/gradle.properties
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=freerdp_pass
          RELEASE_KEY_ALIAS=freerdp_alias
          RELEASE_KEY_PASSWORD=freerdp_pass
          EOF
    
      - name: Build FreeRDP Android Clients (RELEASE)
        working-directory: client/Android/Studio
        run: |
          ./gradlew assembleRelease --stacktrace --no-daemon

      - name: Locate Compiles Output APK
        id: locate-apk
        run: |
          echo "Finding compiled APKs..."
          APK_PATH=$(find client/Android/Studio -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: Compiled APK not found!"
            exit 1
          fi
          echo "Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK Compiled Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreeRDP-Android-stable-3.0-release
          path: ${{ steps.locate-apk.outputs.apk_path }}
          retention-days: 14
          compression-level: 6
