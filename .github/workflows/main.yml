name: Cloud Browser via Ngrok (Guaranteed Cache & NoVNC Link)

on:
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Inisialisasi Kunci Penyimpanan Cache Docker
      - name: Cache Docker layers
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/docker-save
          key: ${{ runner.os }}-docker-firefox-v5 # Versi key baru untuk mengamankan penyimpanan cache pertama Anda

      # 2. Muat Image jika Cache-Hit, Unduh jika Cache-Miss
      - name: Load Docker Image
        run: |
          if [ "${{ steps.cache-docker.outputs.cache-hit }}" = "true" ]; then
            echo "✅ Memuat container langsung dari Cache GitHub..."
            docker load -i /tmp/docker-save/firefox-image.tar
          else
            echo "📦 Cache tidak ditemukan. Mengunduh image dari Docker Hub..."
            docker pull selenium/standalone-firefox:latest
            mkdir -p /tmp/docker-save
            docker save selenium/standalone-firefox:latest -o /tmp/docker-save/firefox-image.tar
          fi

      # 3. Jalankan Container Firefox NoVNC (Port: 7900)
      - name: Run Firefox Container
        run: |
          docker run -d --name firefox-node \
            --user root \
            -p 7900:7900 \
            -p 5900:5900 \
            --shm-size=2g \
            selenium/standalone-firefox:latest

      # 4. Gunakan Perintah APT Resmi Anda untuk Memasang Ngrok (Pasti Berhasil)
      - name: Install Ngrok via APT
        run: |
          curl -sSL https://amazonaws.com \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
            && echo "deb https://amazonaws.com bookworm main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list \
            && sudo apt update \
            && sudo apt install -y ngrok

      # 5. Jalankan Ngrok menggunakan skema TCP ke port noVNC (Bypass Pemblokiran Cloud)
      - name: Start Ngrok Tunnel
        run: |
          ngrok config add-authtoken 2eGyEJzcdePNVkGXaSao5HUo7QO_Ci6EDAi5wmRYV99kZQNB
          ngrok tcp 7900 --log=stdout > ngrok.log &

      # 6. PERBAIKAN UTAMA: Ambil URL Ngrok dengan Indeks Array [0] yang Benar
      - name: Get noVNC URL
        run: |
          sleep 12
          echo "================================================================"
          echo "Mencoba mengekstrak URL Ngrok..."
          
          # Menggunakan filter .tunnels[0].public_url untuk membaca format JSON Ngrok v3 terbaru
          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          if [ "$PUBLIC_URL" = "null" ] || [ -z "$PUBLIC_URL" ]; then
            echo "❌ ERROR: Terowongan gagal terbentuk. Berikut isi log Ngrok Anda:"
            echo "================================================================"
            cat ngrok.log
            echo "================================================================"
            exit 1
          fi
          
          # Mengubah prefiks alamat tcp:// menjadi https:// untuk kebutuhan noVNC Web UI
          CLEAN_URL=$(echo $PUBLIC_URL | sed 's/tcp:\/\//https:\/\//')
          
          echo "✅ SUKSES BESAR! SALIN DAN BUKA TAUTAN INI DI WEB BROWSER ANDA:"
          echo "$CLEAN_URL/vnc.html?autoconnect=1&resize=scale&password=secret"
          echo "================================================================"

      # 7. Sesi Hidup Selama 6 Jam (Langkah sukses = Cache aman tersimpan permanen)
      - name: Keep Alive
        run: |
          echo "Cloud Browser Anda aktif. Silakan berselancar menggunakan tautan di atas."
          sleep 21600

      # 8. Proses Pembersihan Kontainer Sesi Aktif
      - name: Cleanup Connections and Containers
        if: always()
        run: |
          echo "Menghentikan instans memori RAM tanpa menghapus file cache .tar..."
          pkill ngrok || true
          docker stop firefox-node || true
          docker rm firefox-node || true
