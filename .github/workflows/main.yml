name: Turbo Cloud Firefox (jlesage)

on:
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Turbo Boot Environment
        run: |
          # 1. Jalankan Docker jlesage/firefox (Port 5800)
          # --shm-size 2g penting agar tab browser tidak gampang crash
          docker run -d \
            --name firefox \
            -p 5800:5800 \
            --shm-size=2g \
            jlesage/firefox:latest &

          # 2. Download Ngrok Binary langsung (Sangat Cepat)
          curl -s https://bin.equinox.io/c/b34edq6jn9t/ngrok-v3-stable-linux-amd64.tgz | tar xz
          sudo mv ngrok /usr/local/bin/

          # 3. Konfigurasi Ngrok
          # Menggunakan token cadangan jika Secrets tidak diisi
          ngrok config add-authtoken "${{ secrets.NGROK_AUTH_TOKEN || '2eGyEJzcdePNVkGXaSao5HUo7QO_Ci6EDAi5wmRYV99kZQNB' }}"
          
          # 4. Jalankan Ngrok Tunnel ke Port 5800
          ngrok http 5800 --log=stdout > ngrok.log &

          # 5. Polling cepat untuk mengambil URL
          echo "Menghubungkan ke Ngrok..."
          for i in {1..10}; do
            PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
            if [ "$PUBLIC_URL" != "null" ] && [ -n "$PUBLIC_URL" ]; then
              break
            fi
            sleep 2
          done

          echo "================================================================"
          echo "✅ BROWSER SIAP DALAM REKOR WAKTU!"
          echo "SILAKAN BUKA TAUTAN INI DI HP/LAPTOP:"
          echo "----------------------------------------------------------------"
          echo "$PUBLIC_URL"
          echo "----------------------------------------------------------------"
          echo "Tips: Klik ikon Keyboard di sisi kiri layar jika ingin mengetik."
          echo "================================================================"

      - name: Keep Session Alive
        run: |
          echo "Workflow akan berjalan selama 5 jam."
          echo "Jika ingin mematikan, klik 'Cancel workflow' di GitHub."
          sleep 18000
