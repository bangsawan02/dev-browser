name: Cloud Browser via Ngrok (noVNC Firefox)

on:
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest
    
    # Menggunakan container Firefox yang sudah terintegrasi dengan noVNC
    container:
      image: selenium/standalone-firefox:latest
      options: --user root

    steps:
      - name: Verify Firefox Installation
        run: firefox --version

      - name: Setup and Start Ngrok
        run: |
          # Download dan install Ngrok di dalam kontainer
          wget -q https://equinox.io
          tar -xvzf ngrok-stable-linux-amd64.tgz
          mv ngrok /usr/local/bin/ngrok
          
          # Konfigurasi token Ngrok
          ngrok config add-authtoken 2eGyEJzcdePNVkGXaSao5HUo7QO_Ci6EDAi5wmRYV99kZQNB
          
          # Sambungkan Ngrok ke HTTP port noVNC (Port default: 7900)
          ngrok http 7900 --log=stdout > ngrok.log &

      - name: Get noVNC URL
        run: |
          sleep 5
          echo "================================================================"
          echo "KLIK TAUTAN DI BAWAH INI UNTUK MEMBUKA BROWSER:"
          
          # Mengambil URL Publik Ngrok
          PUBLIC_URL=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          
          # Membuat direct link yang otomatis mengisi password dan scaling layar
          echo "$PUBLIC_URL/vnc.html?autoconnect=1&resize=scale&password=secret"
          echo "================================================================"

      - name: Keep Alive
        run: |
          echo "Cloud Browser aktif selama 6 jam."
          sleep 21600

      - name: Cleanup Connections
        if: always()
        run: |
          echo "Menutup semua koneksi Ngrok..."
          pkill ngrok || true
