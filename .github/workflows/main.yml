name: Turbo Cloud Firefox (Cloudflared Tunnel)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [on_trigger_browser]

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Turbo Boot Environment
        run: |
          # 1. Jalankan Docker jlesage/firefox di background
          echo "🚀 Menjalankan container Firefox..."
          docker run -d \
            --name firefox \
            -p 5800:5800 \
            --shm-size=2g \
            jlesage/firefox:latest

          # 2. Download Cloudflared Binary Resmi
          echo "📦 Mengunduh Cloudflared..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

          # 3. Jalankan Cloudflare Tunnel ke Port 5800
          echo "🌐 Membuka terowongan Cloudflare..."
          cloudflared tunnel --url http://localhost:5800 > cf.log 2>&1 &

          # 4. Polling cepat untuk mengambil URL publik
          echo "⏳ Menunggu link siap..."
          sleep 12

          PUBLIC_URL=$(cat cf.log | grep -o 'https://[^ ]*.trycloudflare.com' | head -n 1)

          if [ -z "$PUBLIC_URL" ]; then
            echo "⚠️ Koneksi lambat, mencoba mengambil ulang URL..."
            sleep 10
            PUBLIC_URL=$(cat cf.log | grep -o 'https://[^ ]*.trycloudflare.com' | head -n 1)
          fi

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Gagal mendapatkan URL Cloudflared. Berikut isi log:"
            echo "================================================================"
            cat cf.log
            echo "================================================================"
            exit 1
          fi

          echo "================================================================"
          echo "✅ BERHASIL!"
          echo "BUKA LINK INI DI BROWSER KAMU:"
          echo "----------------------------------------------------------------"
          echo "$PUBLIC_URL"
          echo "----------------------------------------------------------------"
          echo "================================================================"

      - name: Keep Session Alive
        run: |
          echo "Workflow aktif selama 5 jam. Klik 'Cancel workflow' jika sudah selesai."
          sleep 18000
