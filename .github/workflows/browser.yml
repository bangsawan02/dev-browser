name: Turbo Cloud Firefox (Cloudflared Tunnel)

on:
  workflow_dispatch:
    inputs:
      gdrive_token:
        description: 'Google Drive Access Token'
        required: false
        default: ''
      app_url:
        description: 'Webapp Callback URL'
        required: false
        default: ''
      passcode:
        description: 'Session Passcode'
        required: false
        default: ''
  repository_dispatch:
    types: [on_trigger_browser]

permissions:
  contents: read
  statuses: write

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - name: Persist Firefox Profile Data
        uses: actions/cache/restore@v4
        with:
          path: /home/runner/firefox_profile
          key: firefox-profile-${{ github.run_id }}
          restore-keys: |
            firefox-profile-

      - name: Restore Docker Image Cache
        id: cache-docker
        uses: actions/cache/restore@v4
        with:
          path: /home/runner/docker-image
          key: docker-firefox-latest

      - name: Load Docker Image
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          echo "🔄 Memuat image Firefox dari cache..."
          docker load -i /home/runner/docker-image/firefox.tar || echo "Gagal memuat cache, akan mengunduh ulang."

      - name: Turbo Boot Environment & Keep Alive
        run: |
          # 1. Parsing Input Parameter Sesi
          GDRIVE_TOKEN="${{ github.event.inputs.gdrive_token }}"
          APP_URL="${{ github.event.inputs.app_url }}"
          PASSCODE="${{ github.event.inputs.passcode }}"
          
          if [ -z "$GDRIVE_TOKEN" ]; then
            GDRIVE_TOKEN="${{ github.event.client_payload.gdrive_token }}"
          fi
          if [ -z "$APP_URL" ]; then
            APP_URL="${{ github.event.client_payload.app_url }}"
          fi
          if [ -z "$PASSCODE" ]; then
            PASSCODE="${{ github.event.client_payload.passcode }}"
          fi

          # Jika image belum ada, unduh dan simpan
          if [[ "$(docker images -q jlesage/firefox:latest 2> /dev/null)" == "" ]]; then
            echo "📥 Mengunduh image Firefox..."
            docker pull jlesage/firefox:latest
            mkdir -p /home/runner/docker-image
            docker save jlesage/firefox:latest -o /home/runner/docker-image/firefox.tar
            echo "✅ Image berhasil disimpan ke cache offline."
          fi

          echo "🚀 Menjalankan container Firefox..."
          mkdir -p /home/runner/downloads
          mkdir -p /home/runner/firefox_profile
          sudo chown -R 1000:1000 /home/runner/firefox_profile /home/runner/downloads || true
          sudo chmod -R 777 /home/runner/firefox_profile /home/runner/downloads || true
          
          # Jalankan container Firefox (VNC default port 5800)
          # Bind profile ke folder host /home/runner/firefox_profile agar tersimpan
          # Bind downloads ke folder host /home/runner/downloads
          docker run -d \
            --name firefox \
            -p 5800:5800 \
            -v /home/runner/firefox_profile:/config \
            -v /home/runner/downloads:/config/Downloads \
            --shm-size=2g \
            jlesage/firefox:latest

          # 2. Unduh dan install Cloudflared Tunnel
          echo "📦 Mengunduh Cloudflared..."
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
          chmod +x cloudflared
          sudo mv cloudflared /usr/local/bin/

          # 3. Ekspos GUI port 5800 ke Cloudflare Tunnel
          echo "🌐 Membuka terowongan Cloudflare..."
          cloudflared tunnel --url http://localhost:5800 > cf.log 2>&1 &

          # 4. Ambil URL Publik hasil tunnel
          echo "⏳ Menunggu link siap..."
          sleep 12

          PUBLIC_URL=$(cat cf.log | grep -o 'https://[^ ]*.trycloudflare.com' | head -n 1)

          if [ -z "$PUBLIC_URL" ]; then
            echo "⚠️ Koneksi lambat, mencoba mengambil ulang URL..."
            sleep 10
            PUBLIC_URL=$(cat cf.log | grep -o 'https://[^ ]*.trycloudflare.com' | head -n 1)
          fi

          if [ -z "$PUBLIC_URL" ]; then
            echo "❌ Gagal mendapatkan URL Cloudflared. Log cf.log:"
            cat cf.log
            exit 1
          fi

          echo "================================================================"
          echo "✅ BERHASIL!"
          echo "BUKA LINK INI: $PUBLIC_URL"
          echo "================================================================"

          # Publikasikan URL lewat Commit Status sehingga App bisa membacanya 
          curl -s -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/statuses/${{ github.sha }} \
            -d "{\"state\":\"success\",\"target_url\":\"$PUBLIC_URL\",\"description\":\"Firefox VNC Aktif\",\"context\":\"Turbo Firefox VNC\"}"

          # 5. Background Folder Watcher: Auto-Upload Berkas ke Google Drive & Real-Time Reporting
          echo "👀 Memulai pemantauan unduhan..."
          
          # Jika GDrive Token disuplai, cari atau buat folder "Turbo Firefox Downloads" di GDrive
          if [ ! -z "$GDRIVE_TOKEN" ]; then
            FOLDER_ID=$(curl -s -H "Authorization: Bearer $GDRIVE_TOKEN" \
              "https://www.googleapis.com/drive/v3/files?q=name%3D%27Turbo%20Firefox%20Downloads%27%20and%20mimeType%3D%27application%2Fvnd.google-apps.folder%27%20and%20trashed%3Dfalse" | grep -o '"id": "[^"]*' | head -n 1 | cut -d'"' -f4)

            if [ -z "$FOLDER_ID" ]; then
              FOLDER_ID=$(curl -s -X POST \
                -H "Authorization: Bearer $GDRIVE_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"name": "Turbo Firefox Downloads", "mimeType": "application/vnd.google-apps.folder"}' \
                "https://www.googleapis.com/drive/v3/files" | grep -o '"id": "[^"]*' | head -n 1 | cut -d'"' -f4)
            fi
            echo "📁 Folder Sync GDrive ID: $FOLDER_ID"
          fi

          while true; do
            # A. Deteksi file yang sedang diunduh (aktif)
            for filepath in /home/runner/downloads/*; do
              if [ -f "$filepath" ]; then
                filename=$(basename "$filepath")
                filesize=$(du -h "$filepath" | cut -f1)
                
                # Jika ada file temporer unduhan (.part, .crdownload, .tmp, dsb)
                if [[ "$filename" == *.part || "$filename" == *.crdownload || "$filename" == *.tmp || "$filename" == .* ]]; then
                  if [[ "$filename" == .* ]]; then continue; fi
                  
                  # Bersihkan ekstensi temporer untuk nama asli
                  target_name="$filename"
                  target_name="${target_name%.crdownload}"
                  target_name="${target_name%.part}"
                  target_name="${target_name%.tmp}"
                  
                  # Laporkan status download aktif ke App
                  if [ ! -f "/home/runner/uploaded_$target_name" ]; then
                    curl -s -X POST \
                      -H "Content-Type: application/json" \
                      -d "{"passcode":"$PASSCODE","run_id":"${{ github.run_id }}","filename":"$target_name","status":"downloading","size":"$filesize"}" \
                      "$APP_URL/api/callback/download" || true
                  fi
                fi
              fi
            done

            # B. Deteksi file yang sudah selesai diunduh dan upload ke GDrive (jika aktif)
            for filepath in /home/runner/downloads/*; do
              if [ -f "$filepath" ]; then
                filename=$(basename "$filepath")
                filesize=$(du -h "$filepath" | cut -f1)
                
                # Skip berkas tidak lengkap (.part, temp/crdownload)
                if [[ ! "$filename" == *.part && ! "$filename" == .* && ! "$filename" == *.crdownload && ! "$filename" == *.tmp ]]; then
                  if [ ! -f "/home/runner/uploaded_$filename" ]; then
                    echo "📥 Berkas baru selesai terdeteksi: $filename"
                    
                    if [ ! -z "$GDRIVE_TOKEN" ]; then
                      # Laporkan status "uploading" jika mengunggah ke GDrive
                      curl -s -X POST \
                        -H "Content-Type: application/json" \
                        -d "{"passcode":"$PASSCODE","run_id":"${{ github.run_id }}","filename":"$filename","status":"uploading","size":"$filesize"}" \
                        "$APP_URL/api/callback/download" || true

                      # Upload file via multipart upload ke GDrive
                      RESPONSE=$(curl -s -X POST \
                        -H "Authorization: Bearer $GDRIVE_TOKEN" \
                        -F "metadata={name: '$filename', parents: ['$FOLDER_ID']};type=application/json;charset=UTF-8" \
                        -F "file=@$filepath" \
                        "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart")

                      echo "Tanggapan Drive: $RESPONSE"
                      
                      # Ambil GDrive ID dari respons
                      GDRIVE_ID=$(echo "$RESPONSE" | grep -o '"id": "[^"]*' | head -n 1 | cut -d'"' -f4)

                      if [ ! -z "$GDRIVE_ID" ]; then
                        echo "✅ Google Drive ID: $GDRIVE_ID"
                        # Laporkan status "success" lengkap dengan Google Drive ID
                        curl -s -X POST \
                          -H "Content-Type: application/json" \
                          -d "{"passcode":"$PASSCODE","run_id":"${{ github.run_id }}","filename":"$filename","status":"success","gdriveId":"$GDRIVE_ID","size":"$filesize"}" \
                          "$APP_URL/api/callback/download" || true
                      else
                        curl -s -X POST \
                          -H "Content-Type: application/json" \
                          -d "{"passcode":"$PASSCODE","run_id":"${{ github.run_id }}","filename":"$filename","status":"completed","size":"$filesize"}" \
                          "$APP_URL/api/callback/download" || true
                      fi
                    else
                      # Tanpa Google Drive, laporkan sebagai "completed" secara lokal
                      curl -s -X POST \
                        -H "Content-Type: application/json" \
                        -d "{"passcode":"$PASSCODE","run_id":"${{ github.run_id }}","filename":"$filename","status":"completed","size":"$filesize"}" \
                        "$APP_URL/api/callback/download" || true
                    fi

                    touch "/home/runner/uploaded_$filename"
                  fi
                fi
              fi
            done
            sleep 4
          done &

          # 6. Jaga Sesi VM Browser Tetap Aktif selama 5 jam (18.000 detik)
          echo "⏳ Firefox Cloud aktif..."
          sleep 18000

      - name: Prep and Fix Permissions for Cache
        if: always()
        run: |
          echo "⏹️ Memberhentikan container Firefox..."
          docker stop firefox || true
          echo "🔑 Mengatur hak milik file profile ke runner..."
          sudo chown -R $(id -u):$(id -g) /home/runner/firefox_profile || true
          sudo chown -R $(id -u):$(id -g) /home/runner/docker-image || true

      - name: Save Firefox Profile Data
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /home/runner/firefox_profile
          key: firefox-profile-${{ github.run_id }}

      - name: Save Docker Image Cache
        if: always() && steps.cache-docker.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /home/runner/docker-image
          key: docker-firefox-latest
